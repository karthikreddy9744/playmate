spring.application.name=playmate
server.port=${BACKEND_PORT}

# =========================================
# Supabase PostgreSQL Database (Direct)
# =========================================
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD}
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
# Dialect auto-detected by Hibernate â€” no need to set explicitly

# =========================================
# API documentation (dev only)
# =========================================
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true
springdoc.swagger-ui.path=/swagger-ui/index.html

server.address=0.0.0.0

management.endpoints.web.exposure.include=*
management.endpoint.health.show-details=always
management.endpoint.health.access=unrestricted
management.endpoints.web.base-path=/actuator

# =========================================
# JWT
# =========================================
jwt.secret=${JWT_SECRET}
jwt.expiration=${JWT_EXPIRATION}

# =========================================
# Redis (OTP caching)
# =========================================
spring.data.redis.host=${REDIS_HOST}
spring.data.redis.port=${REDIS_PORT}
spring.data.redis.password=${REDIS_PASSWORD}
spring.data.redis.timeout=3000ms
spring.data.redis.lettuce.pool.max-active=8
spring.data.redis.lettuce.pool.max-idle=4
spring.data.redis.lettuce.pool.min-idle=1

# =========================================
# Cloudinary
# =========================================
cloudinary.cloud.name=${CLOUDINARY_CLOUD_NAME}
cloudinary.api.key=${CLOUDINARY_API_KEY}
cloudinary.api.secret=${CLOUDINARY_API_SECRET}

# =========================================
# Brevo Email
# =========================================
brevo.api.key=${BREVO_API_KEY}
brevo.sender.email=${BREVO_SENDER_EMAIL}
brevo.sender.name=${BREVO_SENDER_NAME}

# =========================================
# Firebase client config (used for reference)
# =========================================
firebase.project.id=${FIREBASE_PROJECT_ID}

# =========================================
# File upload limits
# =========================================
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# =========================================
# CORS Configuration
# =========================================
cors.allowed-origins=${ALLOWED_ORIGINS}

# =========================================
# Logging (overridden in prod profile)
# =========================================
logging.level.com.playmate=DEBUG
logging.level.org.springframework.web=INFO

# =========================================
# Message Encryption (AES-256-GCM)
# =========================================
playmate.msg.encryption-key=${PLAYMATE_MSG_ENCRYPTION_KEY}