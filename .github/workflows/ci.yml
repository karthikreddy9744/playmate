name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build-backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'
      - name: Build backend
        working-directory: backend
        run: |
          ./mvnw -DskipTests package

  e2e:
    runs-on: ubuntu-latest
    needs: build-backend
    services:
      backend:
        image: openjdk:17
        options: >-
          --health-cmd "curl -sSf http://localhost:8080/actuator/health || exit 1"
          --health-interval 10s --health-timeout 5s --health-retries 12
        ports:
          - 8080:8080
        env:
          SPRING_PROFILES_ACTIVE: test
        volumes:
          - ./:/workspace
        # start backend in container entrypoint
    steps:
      - uses: actions/checkout@v4
      - name: Install Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci
      - name: Start backend (local)
        run: |
          pushd backend
          ./mvnw -DskipTests spring-boot:run &
          popd
      - name: Wait for backend
        run: |
          for i in {1..30}; do
            curl -sSf http://localhost:8080/actuator/health && break || sleep 2
          done
      - name: Run Cypress E2E
        working-directory: frontend
        env:
          CYPRESS_baseUrl: http://localhost:5173
          # Integration gates — set these as repo secrets to enable external integrations
          CLOUDINARY_INTEGRATION: ${{ secrets.CLOUDINARY_INTEGRATION || 'false' }}
          BREVO_INTEGRATION: ${{ secrets.BREVO_INTEGRATION || 'false' }}
        run: |
          npm run dev &
          # wait for vite
          for i in {1..30}; do
            curl -sSf http://localhost:5173 || sleep 2 && break
          done
          npm run cy:run
